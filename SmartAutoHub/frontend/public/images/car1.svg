<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffc107;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ff9800;stop-opacity:0" />
    </linearGradient>
  </defs>
  <!-- Background Gradient -->
  <rect width="1200" height="700" fill="url(#grad1)"/>
  <!-- Sun Glow -->
  <ellipse cx="1050" cy="80" rx="150" ry="120" fill="url(#sunGrad)"/>
  <!-- Sun -->
  <circle cx="1050" cy="80" r="60" fill="#ffc107"/>
  <!-- Road -->
  <path d="M 0 520 Q 600 480 1200 520 L 1200 700 L 0 700 Z" fill="#2c3e50"/>
  <path d="M 0 540 Q 600 500 1200 540" stroke="#f1c40f" stroke-width="6" fill="none" stroke-dasharray="80,40"/>
  <!-- Sports Car Body (Silver Subaru-style) -->
  <g transform="translate(400, 350)">
    <!-- Main Body -->
    <path d="M 50 100 L 150 60 L 320 60 L 380 100 Z" fill="#c0c0c0" stroke="#808080" stroke-width="2"/>
    <path d="M 50 100 L 60 180 L 370 180 L 380 100 Z" fill="#d4d4d4" stroke="#808080" stroke-width="2"/>
    <!-- Front Bumper -->
    <rect x="50" y="100" width="330" height="25" fill="#333" opacity="0.8"/>
    <!-- Windows -->
    <path d="M 100 70 L 140 50 L 200 50 L 190 70 Z" fill="#87ceeb" opacity="0.6" stroke="#333" stroke-width="1"/>
    <path d="M 210 70 L 230 50 L 310 50 L 330 70 Z" fill="#87ceeb" opacity="0.6" stroke="#333" stroke-width="1"/>
    <!-- Door Lines -->
    <line x1="150" y1="65" x2="150" y2="175" stroke="#999" stroke-width="1" opacity="0.5"/>
    <!-- Headlights -->
    <circle cx="65" cy="105" r="12" fill="#ffed4e"/>
    <circle cx="65" cy="105" r="8" fill="#ffd700" opacity="0.8"/>
    <!-- Wheels -->
    <circle cx="120" cy="200" r="50" fill="#1a1a1a"/>
    <circle cx="120" cy="200" r="40" fill="#2c3e50"/>
    <circle cx="120" cy="200" r="30" fill="#444"/>
    <circle cx="310" cy="200" r="50" fill="#1a1a1a"/>
    <circle cx="310" cy="200" r="40" fill="#2c3e50"/>
    <circle cx="310" cy="200" r="30" fill="#444"/>
    <!-- Wheel Rim Detail -->
    <circle cx="120" cy="200" r="20" fill="none" stroke="#666" stroke-width="2" stroke-dasharray="3,2" opacity="0.6"/>
    <circle cx="310" cy="200" r="20" fill="none" stroke="#666" stroke-width="2" stroke-dasharray="3,2" opacity="0.6"/>
  </g>
  <!-- Text Overlay -->
  <text x="600" y="620" font-size="48" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial">Premium Performance</text>
  <text x="600" y="670" font-size="24" text-anchor="middle" fill="#95a5a6" font-family="Arial">Experience the Drive</text>
</svg>