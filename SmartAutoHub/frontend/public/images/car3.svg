<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sunsetGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f7931e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueCarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2196F3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1565c0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Sky with Sunset -->
  <rect width="1200" height="700" fill="url(#sunsetGrad)"/>
  <!-- Sun Circle -->
  <circle cx="1100" cy="120" r="80" fill="#ff9800" opacity="0.3"/>
  <!-- Road -->
  <path d="M 0 520 L 1200 520 L 1200 700 L 0 700 Z" fill="#333"/>
  <!-- Road Lane -->
  <path d="M 0 560 Q 600 540 1200 560" stroke="#fff" stroke-width="4" fill="none" stroke-dasharray="80,40" opacity="0.7"/>
  <!-- Modern SUV/Crossover (Blue) -->
  <g transform="translate(320, 300)">
    <!-- Body Profile -->
    <path d="M 100 140 L 200 110 L 420 100 L 500 140 Z" fill="url(#blueCarGrad)" stroke="#0d47a1" stroke-width="2"/>
    <rect x="100" y="140" width="400" height="110" rx="10" fill="#2196F3" stroke="#0d47a1" stroke-width="2"/>
    <!-- Roof Line -->
    <path d="M 140 110 L 200 80 L 380 80 L 420 110 Z" fill="#1976d2" stroke="#0d47a1" stroke-width="2"/>
    <!-- Door Crease -->
    <line x1="260" y1="100" x2="270" y2="245" stroke="#0d47a1" stroke-width="1.5" opacity="0.6"/>
    <!-- Windows (Front) -->
    <path d="M 150 95 L 190 70 L 260 70 L 250 95 Z" fill="#64b5f6" opacity="0.75"/>
    <!-- Windows (Rear) -->
    <path d="M 280 95 L 310 75 L 390 75 L 380 95 Z" fill="#64b5f6" opacity="0.75"/>
    <!-- Side Mirror -->
    <rect x="105" y="125" width="8" height="25" fill="#1a1a1a"/>
    <!-- LED Accent -->
    <rect x="110" y="150" width="80" height="8" fill="#ffeb3b" opacity="0.8" rx="4"/>
    <!-- Wheels -->
    <circle cx="180" cy="260" r="60" fill="#1a1a1a"/>
    <circle cx="180" cy="260" r="48" fill="#333"/>
    <circle cx="180" cy="260" r="38" fill="#222"/>
    <circle cx="420" cy="260" r="60" fill="#1a1a1a"/>
    <circle cx="420" cy="260" r="48" fill="#333"/>
    <circle cx="420" cy="260" r="38" fill="#222"/>
    <!-- Alloy Wheel Detail -->
    <circle cx="180" cy="260" r="25" fill="none" stroke="#666" stroke-width="2.5" stroke-dasharray="6,4"/>
    <circle cx="420" cy="260" r="25" fill="none" stroke="#666" stroke-width="2.5" stroke-dasharray="6,4"/>
    <!-- Checkmark Badge -->
    <circle cx="470" cy="130" r="25" fill="#4caf50"/>
    <path d="M 460 135 L 468 143 L 480 128" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Text -->
  <text x="600" y="620" font-size="48" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial">Smart Buying Made Easy</text>
  <text x="600" y="670" font-size="24" text-anchor="middle" fill="#ecf0f1" font-family="Arial">Transparent Pricing • Instant Verification</text>
</svg>