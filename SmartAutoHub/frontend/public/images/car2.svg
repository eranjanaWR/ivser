<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nightSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="carRedGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Sky Background -->
  <rect width="1200" height="700" fill="url(#nightSky)"/>
  <!-- Stars -->
  <circle cx="150" cy="80" r="2" fill="white" opacity="0.8"/>
  <circle cx="350" cy="120" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="900" cy="100" r="2" fill="white" opacity="0.7"/>
  <circle cx="1050" cy="150" r="1" fill="white" opacity="0.5"/>
  <!-- Road -->
  <path d="M 0 520 L 1200 520 L 1200 700 L 0 700 Z" fill="#34495e"/>
  <path d="M 0 540 Q 600 520 1200 540" stroke="#ecf0f1" stroke-width="5" fill="none" stroke-dasharray="60,40"/>
  <!-- Red Sports Car -->
  <g transform="translate(350, 320)">
    <!-- Main Body -->
    <path d="M 80 120 L 200 80 L 380 80 L 450 120 Z" fill="url(#carRedGrad)" stroke="#a93226" stroke-width="2"/>
    <path d="M 80 120 L 100 220 L 430 220 L 450 120 Z" fill="#e74c3c" stroke="#a93226" stroke-width="2"/>
    <!-- Front End -->
    <path d="M 80 120 L 80 180 L 100 220 L 100 180 Z" fill="#d32f2f" stroke="#a93226" stroke-width="1"/>
    <!-- Spoiler -->
    <rect x="430" y="85" width="15" height="50" fill="#c0392b"/>
    <!-- Side Vent -->
    <rect x="280" y="120" width="60" height="20" fill="#b71c1c" opacity="0.8"/>
    <!-- Windows -->
    <path d="M 130 95 L 180 75 L 240 75 L 220 95 Z" fill="#64b5f6" opacity="0.7"/>
    <path d="M 250 100 L 280 80 L 360 80 L 350 100 Z" fill="#64b5f6" opacity="0.7"/>
    <!-- Doors Line -->
    <line x1="200" y1="90" x2="200" y2="210" stroke="#8b0000" stroke-width="2" opacity="0.6"/>
    <!-- LED Headlights -->
    <circle cx="95" cy="135" r="15" fill="#ffeb3b"/>
    <path d="M 95 135 L 100 128 L 105 135 L 100 142 Z" fill="#fbc02d"/>
    <!-- Wheels -->
    <circle cx="160" cy="240" r="55" fill="#1a1a1a"/>
    <circle cx="160" cy="240" r="45" fill="#2c3e50"/>
    <circle cx="160" cy="240" r="35" fill="#000"/>
    <circle cx="380" cy="240" r="55" fill="#1a1a1a"/>
    <circle cx="380" cy="240" r="45" fill="#2c3e50"/>
    <circle cx="380" cy="240" r="35" fill="#000"/>
    <!-- Wheel Rims -->
    <circle cx="160" cy="240" r="22" fill="none" stroke="#888" stroke-width="2" stroke-dasharray="4,3"/>
    <circle cx="380" cy="240" r="22" fill="none" stroke="#888" stroke-width="2" stroke-dasharray="4,3"/>
  </g>
  <!-- Text -->
  <text x="600" y="620" font-size="48" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial">Verified & Trusted</text>
  <text x="600" y="670" font-size="24" text-anchor="middle" fill="#95a5a6" font-family="Arial">Browse Thousands of Listings</text>
</svg>